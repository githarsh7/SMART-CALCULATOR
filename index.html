<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCY | THEMED</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="floating-sands">
        <!-- Sand particles floating up (20 particles) -->
        <div class="sand-particle" style="left: 5%; animation-duration: 10s; animation-delay: 0s;"></div>
        <div class="sand-particle" style="left: 12%; animation-duration: 13s; animation-delay: 1s;"></div>
        <div class="sand-particle" style="left: 20%; animation-duration: 11s; animation-delay: 0.5s;"></div>
        <div class="sand-particle" style="left: 28%; animation-duration: 14s; animation-delay: 2s;"></div>
        <div class="sand-particle" style="left: 35%; animation-duration: 12s; animation-delay: 1.5s;"></div>
        <div class="sand-particle" style="left: 43%; animation-duration: 11s; animation-delay: 0.8s;"></div>
        <div class="sand-particle" style="left: 50%; animation-duration: 13s; animation-delay: 2.5s;"></div>
        <div class="sand-particle" style="left: 58%; animation-duration: 10s; animation-delay: 1.2s;"></div>
        <div class="sand-particle" style="left: 65%; animation-duration: 14s; animation-delay: 3s;"></div>
        <div class="sand-particle" style="left: 72%; animation-duration: 12s; animation-delay: 1.8s;"></div>
        <div class="sand-particle" style="left: 80%; animation-duration: 11s; animation-delay: 2.2s;"></div>
        <div class="sand-particle" style="left: 87%; animation-duration: 13s; animation-delay: 0.3s;"></div>
        <div class="sand-particle" style="left: 93%; animation-duration: 12s; animation-delay: 2.8s;"></div>
        <div class="sand-particle" style="left: 8%; animation-duration: 10s; animation-delay: 3.5s;"></div>
        <div class="sand-particle" style="left: 25%; animation-duration: 14s; animation-delay: 4s;"></div>
        <div class="sand-particle" style="left: 45%; animation-duration: 11s; animation-delay: 3.2s;"></div>
        <div class="sand-particle" style="left: 62%; animation-duration: 13s; animation-delay: 4.5s;"></div>
        <div class="sand-particle" style="left: 78%; animation-duration: 12s; animation-delay: 3.8s;"></div>
        <div class="sand-particle" style="left: 90%; animation-duration: 10s; animation-delay: 4.2s;"></div>
        <div class="sand-particle" style="left: 38%; animation-duration: 14s; animation-delay: 5s;"></div>
        
        <!-- Sparkles - glowing gold (15 particles) -->
        <div class="sparkle" style="left: 10%; top: 20%; animation-delay: 0s;"></div>
        <div class="sparkle" style="left: 25%; top: 35%; animation-delay: 0.7s;"></div>
        <div class="sparkle" style="left: 40%; top: 50%; animation-delay: 1.4s;"></div>
        <div class="sparkle" style="left: 55%; top: 25%; animation-delay: 2.1s;"></div>
        <div class="sparkle" style="left: 70%; top: 60%; animation-delay: 0.3s;"></div>
        <div class="sparkle" style="left: 82%; top: 40%; animation-delay: 1s;"></div>
        <div class="sparkle" style="left: 15%; top: 70%; animation-delay: 1.7s;"></div>
        <div class="sparkle" style="left: 32%; top: 15%; animation-delay: 2.4s;"></div>
        <div class="sparkle" style="left: 48%; top: 80%; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="left: 65%; top: 30%; animation-delay: 1.2s;"></div>
        <div class="sparkle" style="left: 78%; top: 75%; animation-delay: 1.9s;"></div>
        <div class="sparkle" style="left: 5%; top: 45%; animation-delay: 2.6s;"></div>
        <div class="sparkle" style="left: 92%; top: 20%; animation-delay: 0.8s;"></div>
        <div class="sparkle" style="left: 58%; top: 65%; animation-delay: 1.5s;"></div>
        <div class="sparkle" style="left: 35%; top: 55%; animation-delay: 2.2s;"></div>
        
        <!-- Dust particles - small floating randomly (25 particles) -->
        <div class="dust-particle" style="left: 7%; top: 12%; animation-duration: 7s; animation-delay: 0s;"></div>
        <div class="dust-particle" style="left: 18%; top: 28%; animation-duration: 9s; animation-delay: 0.5s;"></div>
        <div class="dust-particle" style="left: 32%; top: 45%; animation-duration: 8s; animation-delay: 1s;"></div>
        <div class="dust-particle" style="left: 45%; top: 22%; animation-duration: 7s; animation-delay: 1.5s;"></div>
        <div class="dust-particle" style="left: 58%; top: 65%; animation-duration: 9s; animation-delay: 2s;"></div>
        <div class="dust-particle" style="left: 72%; top: 38%; animation-duration: 8s; animation-delay: 0.3s;"></div>
        <div class="dust-particle" style="left: 85%; top: 52%; animation-duration: 7s; animation-delay: 0.8s;"></div>
        <div class="dust-particle" style="left: 12%; top: 78%; animation-duration: 9s; animation-delay: 1.3s;"></div>
        <div class="dust-particle" style="left: 28%; top: 15%; animation-duration: 8s; animation-delay: 1.8s;"></div>
        <div class="dust-particle" style="left: 42%; top: 88%; animation-duration: 7s; animation-delay: 2.3s;"></div>
        <div class="dust-particle" style="left: 55%; top: 42%; animation-duration: 9s; animation-delay: 0.2s;"></div>
        <div class="dust-particle" style="left: 68%; top: 72%; animation-duration: 8s; animation-delay: 0.7s;"></div>
        <div class="dust-particle" style="left: 82%; top: 25%; animation-duration: 7s; animation-delay: 1.2s;"></div>
        <div class="dust-particle" style="left: 5%; top: 58%; animation-duration: 9s; animation-delay: 1.7s;"></div>
        <div class="dust-particle" style="left: 95%; top: 48%; animation-duration: 8s; animation-delay: 2.2s;"></div>
        <div class="dust-particle" style="left: 22%; top: 35%; animation-duration: 7s; animation-delay: 0.4s;"></div>
        <div class="dust-particle" style="left: 38%; top: 62%; animation-duration: 9s; animation-delay: 0.9s;"></div>
        <div class="dust-particle" style="left: 52%; top: 18%; animation-duration: 8s; animation-delay: 1.4s;"></div>
        <div class="dust-particle" style="left: 65%; top: 85%; animation-duration: 7s; animation-delay: 1.9s;"></div>
        <div class="dust-particle" style="left: 78%; top: 55%; animation-duration: 9s; animation-delay: 2.4s;"></div>
        <div class="dust-particle" style="left: 15%; top: 42%; animation-duration: 8s; animation-delay: 0.6s;"></div>
        <div class="dust-particle" style="left: 30%; top: 75%; animation-duration: 7s; animation-delay: 1.1s;"></div>
        <div class="dust-particle" style="left: 48%; top: 32%; animation-duration: 9s; animation-delay: 1.6s;"></div>
        <div class="dust-particle" style="left: 62%; top: 58%; animation-duration: 8s; animation-delay: 2.1s;"></div>
        <div class="dust-particle" style="left: 88%; top: 68%; animation-duration: 7s; animation-delay: 0.1s;"></div>
        
        <!-- Glow dots - larger pulsing particles (12 particles) -->
        <div class="glow-dot" style="left: 12%; top: 25%; animation-delay: 0s;"></div>
        <div class="glow-dot" style="left: 28%; top: 42%; animation-delay: 0.9s;"></div>
        <div class="glow-dot" style="left: 45%; top: 18%; animation-delay: 1.8s;"></div>
        <div class="glow-dot" style="left: 62%; top: 55%; animation-delay: 2.7s;"></div>
        <div class="glow-dot" style="left: 78%; top: 32%; animation-delay: 0.4s;"></div>
        <div class="glow-dot" style="left: 18%; top: 68%; animation-delay: 1.3s;"></div>
        <div class="glow-dot" style="left: 35%; top: 82%; animation-delay: 2.2s;"></div>
        <div class="glow-dot" style="left: 52%; top: 45%; animation-delay: 0.7s;"></div>
        <div class="glow-dot" style="left: 68%; top: 72%; animation-delay: 1.6s;"></div>
        <div class="glow-dot" style="left: 85%; top: 28%; animation-delay: 2.5s;"></div>
        <div class="glow-dot" style="left: 8%; top: 52%; animation-delay: 0.5s;"></div>
        <div class="glow-dot" style="left: 92%; top: 62%; animation-delay: 1.4s;"></div>
    </div>
    
    <main class="calculator">
        <header class="calculator-header">
            <h1>Sand Calculator</h1>
            <span class="version">v1.0.0</span>
        </header>
        
        <div class="display-container">
            <input type="text" id="display" placeholder="0" readonly>
        </div>
        
        <div class="buttons">
            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button data-value="/">÷</button>
            
            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button data-value="*">×</button>
            
            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-value="-">−</button>
            
            <button data-value="0">0</button>
            <button data-value=".">.</button>
            <button data-value="%">%</button>
            <button data-value="+">+</button>
            
            <button id="clear">C</button>
            <button id="backspace">←</button>
            <button id="equals" class="equal">=</button>
        </div>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
